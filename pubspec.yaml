name: skillconnect
description: "SkillConnect — a Flutter marketplace app connecting users with local skilled workers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.3

  # Local storage
  shared_preferences: ^2.3.2

  # Networking (EmailJS + AI summary API)
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
